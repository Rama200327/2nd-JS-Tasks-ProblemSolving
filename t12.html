<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Floyd Triangle</title>
</head>
<body>
<pre><script>
    let num = 1;
    for (let i = 1; i <= 5; i++) {
        let row = "";
        for (let j = 1; j <= i; j++) {
            row = row + num + " ";
            num++;
        }
        document.write(row + "\n");
    }
</script></pre>
</body>
</html>
