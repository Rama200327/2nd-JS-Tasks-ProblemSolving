<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ascending Digits</title>
</head>
<body>
<pre><script>
    for (let i = 1; i <= 500; i++) {
        let str = i.toString();
        let valid = true;
        if (str.length < 2) {
            valid = false;
        }
        for (let j = 0; j < str.length - 1; j++) {
            if (Number(str[j]) >= Number(str[j + 1])) {
                valid = false;
            }
        }
        if (valid) {
            document.write(i + "\n");
        }
    }
</script></pre>
</body>
</html>
