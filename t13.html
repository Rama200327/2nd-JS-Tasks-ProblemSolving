<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Divisible by 7</title>
</head>
<body>
<pre><script>
    let row = "";
    for (let i = 1; i <= 100; i++) {
        if (i % 7 == 0) {
            row = row + i + " ";
        }
    }
    document.write(row);
</script></pre>
</body>
</html>
