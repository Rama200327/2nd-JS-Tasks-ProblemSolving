<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fibonacci</title>
</head>
<body>
    <script>
        let a = 0;
        let b = 1;
        let result = "";

        for (let i = 1; i <= 10; i++) {
            result += a + " ";
            let next = a + b;
            a = b;
            b = next;
        }

        result += "...";
        document.write(result);
    </script>
</body>
</html>
