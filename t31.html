<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digit Sum Greater Than 10</title>
</head>
<body>
<pre><script>
    for (let i = 1; i <= 200; i++) {
        let str = i.toString();
        let sum = 0;
        for (let j = 0; j < str.length; j++) {
            sum = sum + Number(str[j]);
        }
        if (sum > 10) {
            document.write(i + "\n");
        }
    }
</script></pre>
</body>
</html>
