<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Count C</title>
</head>
<body>
    <script>
        const text = "Orange Coding School";
        let count = 0;

        for (let i = 0; i < text.length; i++) {
            if (text[i] == "c" || text[i] == "C") {
                count++;
            }
        }

        document.write(count);
    </script>
</body>
</html>
