<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sum Equals Reverse Sum</title>
</head>
<body>
<pre><script>
    for (let i = 1; i <= 1000; i++) {
        let str = i.toString();
        let sum = 0;
        for (let j = 0; j < str.length; j++) {
            sum = sum + Number(str[j]);
        }
        let sumStr = sum.toString();
        let reversedSum = "";
        for (let j = sumStr.length - 1; j >= 0; j--) {
            reversedSum = reversedSum + sumStr[j];
        }
        if (sum == Number(reversedSum)) {
            document.write(i + "\n");
        }
    }
</script></pre>
</body>
</html>
