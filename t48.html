<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reverse Is Prime</title>
</head>
<body>
<pre><script>
    for (let i = 1; i <= 1000; i++) {
        let str = i.toString();
        let reversed = "";
        for (let j = str.length - 1; j >= 0; j--) {
            reversed = reversed + str[j];
        }
        let rev = Number(reversed);
        let isPrime = true;
        if (rev < 2) {
            isPrime = false;
        }
        for (let k = 2; k < rev; k++) {
            if (rev % k == 0) {
                isPrime = false;
            }
        }
        if (isPrime) {
            document.write(i + "\n");
        }
    }
</script></pre>
</body>
</html>
