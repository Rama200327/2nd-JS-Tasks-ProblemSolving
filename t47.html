<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sum of Cubes Equals Number</title>
</head>
<body>
<pre><script>
    for (let i = 1; i <= 1000; i++) {
        let str = i.toString();
        let sum = 0;
        for (let j = 0; j < str.length; j++) {
            let digit = Number(str[j]);
            sum = sum + (digit * digit * digit);
        }
        if (sum == i) {
            document.write(i + "\n");
        }
    }
</script></pre>
</body>
</html>
