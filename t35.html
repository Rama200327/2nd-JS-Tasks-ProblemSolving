<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digit Product Divisible by 5</title>
</head>
<body>
<pre><script>
    for (let i = 1; i <= 500; i++) {
        let str = i.toString();
        let product = 1;
        let valid = true;
        for (let j = 0; j < str.length; j++) {
            if (str[j] == "0") {
                valid = false;
            } else {
                product = product * Number(str[j]);
            }
        }
        if (valid && product % 5 == 0) {
            document.write(i + "\n");
        }
    }
</script></pre>
</body>
</html>
