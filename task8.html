<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Factorial</title>
</head>
<body>
    <script>
        const n = 5;
        let factorial = 1;

        for (let i = 1; i <= n; i++) {
            factorial = factorial * i;
        }

        document.write("Factorial of " + n + " = " + factorial);
    </script>
</body>
</html>
