<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reverse Equals Number Plus 9</title>
</head>
<body>
<pre><script>
    for (let i = 1; i <= 1000; i++) {
        let str = i.toString();
        let reversed = "";
        for (let j = str.length - 1; j >= 0; j--) {
            reversed = reversed + str[j];
        }
        if (Number(reversed) == i + 9) {
            document.write(i + "\n");
        }
    }
</script></pre>
</body>
</html>
