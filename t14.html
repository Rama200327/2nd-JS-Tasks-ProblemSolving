<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sum of Odd Numbers</title>
</head>
<body>
<pre><script>
    let sum = 0;
    for (let i = 1; i <= 100; i++) {
        if (i % 2 != 0) {
            sum = sum + i;
        }
    }
    document.write(sum);
</script></pre>
</body>
</html>
