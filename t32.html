<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digit Sum Prime</title>
</head>
<body>
<pre><script>
    for (let i = 1; i <= 500; i++) {
        let str = i.toString();
        let sum = 0;
        for (let j = 0; j < str.length; j++) {
            sum = sum + Number(str[j]);
        }
        let isPrime = true;
        if (sum < 2) {
            isPrime = false;
        }
        for (let k = 2; k < sum; k++) {
            if (sum % k == 0) {
                isPrime = false;
            }
        }
        if (isPrime) {
            document.write(i + "\n");
        }
    }
</script></pre>
</body>
</html>
